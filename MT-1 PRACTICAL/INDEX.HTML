<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Largest Number Finder</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f2f2f2;
        }

        .container {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            margin: 10px;
            padding: 8px;
            width: 80%;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Largest Number Finder</h2>

    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>
    <input type="number" id="num3" placeholder="Enter third number"><br>
     <input type="number" id="num4" placeholder="Enter fourth number"><br>
      <input type="number" id="num5" placeholder="Enter fifth number"><br>

    <button onclick="fL()">Find Largest</button>

    <p id="result"></p>
</div>

<script>
    function fL() {
        let a = parseFloat(document.getElementById("num1").value);
        let b = parseFloat(document.getElementById("num2").value);
        let c = parseFloat(document.getElementById("num3").value);
        let d = parseFloat(document.getElementById("num4").value);
        let e = parseFloat(document.getElementById("num5").value);

       
        let largest = a;

        
        if (b > largest) {
            largest = b;
        }
        if (c > largest) {
            largest = c;
        }
        if (d > largest) {
            largest = d;
        }
        if (e > largest) {
            largest = e;
        }

        document.getElementById("result").innerText =
            "Largest Number is: " + largest;
    }



</script>

</body>
</html>
